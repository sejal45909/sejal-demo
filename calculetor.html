<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>माय जावा कैलकुलेटर</title>
    <style>
        /* CSS: कैलकुलेटर को सुंदर बनाने के लिए */
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f2f5;
            font-family: Arial, sans-serif;
        }
        .calculator {
            background-color: #333;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0px 10px 20px rgba(0,0,0,0.3);
        }
        #display {
            width: 100%;
            height: 50px;
            font-size: 24px;
            text-align: right;
            margin-bottom: 10px;
            padding: 10px;
            box-sizing: border-box;
            border: none;
            border-radius: 5px;
            background: #eee;
        }
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }
        button {
            padding: 20px;
            font-size: 18px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            background-color: #555;
            color: white;
            transition: 0.2s;
        }
        button:hover {
            background-color: #777;
        }
        .operator {
            background-color: #e67e22;
        }
        .operator:hover {
            background-color: #d35400;
        }
        .equal {
            background-color: #27ae60;
            grid-column: span 2;
        }
        .equal:hover {
            background-color: #219150;
        }
        .clear {
            background-color: #c0392b;
            grid-column: span 2;
        }
    </style>
</head>
<body>

    <div class="calculator">
        <!-- आउटपुट स्क्रीन -->
        <input type="text" id="display" disabled>
        
        <!-- बटन -->
        <div class="buttons">
            <button class="clear" onclick="clearDisplay()">C</button>
            <button class="operator" onclick="addToDisplay('/')">/</button>
            <button class="operator" onclick="addToDisplay('*')">×</button>
            
            <button onclick="addToDisplay('7')">7</button>
            <button onclick="addToDisplay('8')">8</button>
            <button onclick="addToDisplay('9')">9</button>
            <button class="operator" onclick="addToDisplay('-')">-</button>
            
            <button onclick="addToDisplay('4')">4</button>
            <button onclick="addToDisplay('5')">5</button>
            <button onclick="addToDisplay('6')">6</button>
            <button class="operator" onclick="addToDisplay('+')">+</button>
            
            <button onclick="addToDisplay('1')">1</button>
            <button onclick="addToDisplay('2')">2</button>
            <button onclick="addToDisplay('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>
            
            <button onclick="addToDisplay('0')" style="grid-column: span 2;">0</button>
            <button onclick="addToDisplay('.')">.</button>
        </div>
    </div>

    <script>
        // JavaScript: हिसाब-किताब के लिए
        let display = document.getElementById('display');

        // स्क्रीन पर नंबर या ऑपरेटर जोड़ने के लिए
        function addToDisplay(input) {
            display.value += input;
        }

        // स्क्रीन साफ करने के लिए
        function clearDisplay() {
            display.value = "";
        }

        // गणना (Calculation) करने के लिए
        function calculate() {
            try {
                // eval() फंक्शन स्ट्रिंग को मैथ में बदल देता है
                display.value = eval(display.value);
            } catch (error) {
                display.value = "Error";
            }
        }
    </script>

</body>
</html>
